services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coffee
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d coffee"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - ENVIRONMENT=dev
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/coffee
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  coffee-service:
    build:
      context: ./coffee-service
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - ENVIRONMENT=dev
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/coffee
      - AUTH_SERVICE_URL=http://auth-service:8000
    ports:
      - "8002:8000"
    depends_on:
      auth-service:
        condition: service_started

  security-service:
    build:
      context: ./security-service
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - ENVIRONMENT=dev
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/coffee
      - REDIS_URL=redis://redis:6379/0
      - AUTH_SERVICE_URL=http://auth-service:8000
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ./security-service
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker --loglevel=info
    env_file: .env
    environment:
      - ENVIRONMENT=dev
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/coffee
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ./security-service
      dockerfile: Dockerfile
    command: celery -A app.celery_app beat --loglevel=info
    env_file: .env
    environment:
      - ENVIRONMENT=dev
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/coffee
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - celery-worker

volumes:
  postgres_data:
  redis_data:
